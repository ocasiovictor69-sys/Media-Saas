# ── Flow Media Pipeline — Cloud Build / Cloud Run ───────────────────────────
# Service: media-saas  |  Silo: isolated, no cross-service dependencies
# Trigger: push to main branch of media-saas repo

substitutions:
  _SERVICE_NAME: media-saas
  _REGION: us-central1
  _PROJECT_ID: tomorrow-now-ai
  _IMAGE: gcr.io/${_PROJECT_ID}/media-saas

steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY'
      - '-t'
      - '$_IMAGE:$SHORT_SHA'
      - '-t'
      - '$_IMAGE:latest'
      - '.'
    secretEnv:
      - 'NEXT_PUBLIC_SUPABASE_URL'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY'

  # 2. Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_IMAGE:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=NEXT_PUBLIC_SUPABASE_URL=MEDIA_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=MEDIA_SUPABASE_ANON_KEY:latest,RESEND_API_KEY=MEDIA_RESEND_API_KEY:latest,NOTIFY_EMAIL=MEDIA_NOTIFY_EMAIL:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/MEDIA_SUPABASE_URL/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/MEDIA_SUPABASE_ANON_KEY/versions/latest
      env: 'NEXT_PUBLIC_SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/MEDIA_RESEND_API_KEY/versions/latest
      env: 'RESEND_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/MEDIA_NOTIFY_EMAIL/versions/latest
      env: 'NOTIFY_EMAIL'

images:
  - '$_IMAGE:$SHORT_SHA'
  - '$_IMAGE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
